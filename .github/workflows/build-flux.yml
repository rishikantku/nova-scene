name: Build and Push Flux Worker Image

on:
  push:
    paths:
      - 'Dockerfile'
      - 'worker/src/flux_handler.py'
      - 'worker/src/wan_handler.py'
      - '.github/workflows/build-flux.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nova-scene-flux:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/nova-scene-flux:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/nova-scene-flux:buildcache,mode=max
